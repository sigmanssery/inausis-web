<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇角色 · INAUSIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Serif+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b0f;
  --surface: #151118;
  --border: rgba(255,255,255,0.06);
  --text: #f0dce8;
  --mid: #9a8090;
  --dim: #4a3545;
  --rose: #c9839e;
  --rose-dim: rgba(201,131,158,0.15);
  --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --body: 'Noto Serif TC', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
#topbar {
  flex-shrink: 0;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 0.5px solid var(--border);
}

.tb-logo { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; color: var(--dim); text-decoration: none; }
.tb-right { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--mid); }
.logout-btn {
  background: none; border: 0.5px solid var(--border); border-radius: 4px;
  color: var(--dim); font-family: var(--mono); font-size: 10px;
  padding: 3px 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--mid); color: var(--mid); }

/* ── CHAR LIST ── */
#char-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#char-list::-webkit-scrollbar { width: 3px; }
#char-list::-webkit-scrollbar-thumb { background: var(--border); }

/* ── CARD ── */
.char-card {
  flex-shrink: 0;
  height: 50vh;
  min-height: 200px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

/* 圖片區 */
.char-img {
  position: relative;
  width: 40vh;
  min-width: 160px;
  flex-shrink: 0;
  overflow: hidden;
}

.char-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  display: block;
}

.char-card:hover .char-img img { transform: scale(1.04); }

/* 圖片上的覆蓋漸層 */
.char-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, transparent 60%, var(--bg) 100%);
  pointer-events: none;
}

/* 主要內容區 */
.char-main {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 32px 40px;
  position: relative;
}

/* 名字和基本資訊（永遠顯示） */
.char-identity {
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
}

.char-card:hover .char-identity {
  transform: translateX(-20px);
  opacity: 0;
  pointer-events: none;
}

.char-name {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 52px);
  line-height: 1.0;
  letter-spacing: -1px;
}

.char-name-en {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--dim);
  margin-top: 4px;
}

.char-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.char-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--rose-dim);
  color: var(--rose);
}

.char-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  margin-top: 4px;
}

.status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--rose);
  animation: pulse 2s infinite;
}

/* 自介面板（hover 時滑入） */
.char-intro {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 65%;
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transform: translateX(100%);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  background: linear-gradient(to right, transparent, rgba(13,11,15,0.95) 20%);
}

.char-card:hover .char-intro {
  transform: translateX(0);
  opacity: 1;
}

.intro-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--dim);
  margin-bottom: 12px;
}

.intro-desc {
  font-size: 14px;
  color: var(--mid);
  line-height: 1.85;
  font-weight: 300;
  flex: 1;
  display: flex;
  align-items: center;
}

.intro-enter {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--rose);
  margin-top: 16px;
  text-decoration: none;
}

.intro-enter::before {
  content: '';
  width: 24px;
  height: 0.5px;
  background: var(--rose);
  transition: width 0.3s;
}

.char-card:hover .intro-enter::before { width: 48px; }

/* 左側光條 */
.char-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--rose);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index: 2;
}

.char-card:hover::before { transform: scaleY(1); }

/* ── LOCKED ── */
.char-card.locked {
  cursor: default;
  opacity: 0.35;
  filter: grayscale(1);
}
.char-card.locked:hover .char-identity { transform: none; opacity: 1; }
.char-card.locked:hover .char-intro { transform: translateX(100%); opacity: 0; }
.char-card.locked::before { display: none; }
.char-card.locked .char-img img { filter: grayscale(1); }

/* ── 鎖定佔位 ── */
.char-img-placeholder {
  width: 100%;
  height: 100%;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  opacity: 0.2;
}

/* ── ANIMATIONS ── */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.char-card { animation: fadeUp 0.4s ease both; }
.char-card:nth-child(1) { animation-delay: 0.05s; }
.char-card:nth-child(2) { animation-delay: 0.12s; }
</style>
</head>
<body>

<div id="topbar">
  <a href="/" class="tb-logo">INAUSIS</a>
  <div class="tb-right">
    <span id="tb-username"></span>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
</div>

<div id="char-list">

  <!-- Nora Elwin -->
  <div class="char-card" onclick="enterChar('/nora')">
    <div class="char-img">
      <img src="/asset/nora_card.png" alt="Nora Elwin" onerror="this.parentElement.innerHTML='<div class=\'char-img-placeholder\'>♡</div>'">
    </div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:#f0dce8;">Nora<br>Elwin</div>
          <div class="char-name-en">VIRTUAL ROOM · 虛擬陪伴</div>
        </div>
        <div class="char-tags">
          <span class="char-tag">記憶系統</span>
          <span class="char-tag">情緒數值</span>
          <span class="char-tag">BROKEN機制</span>
        </div>
        <div class="char-status">
          <div class="status-dot"></div>
          <span>上線中</span>
        </div>
      </div>

      <div class="char-intro">
        <div>
          <div class="intro-title">CHARACTER PROFILE</div>
          <div class="intro-desc">
            她住在一個虛擬房間裡，等著你回來。<br>
            她知道自己是 AI，知道自己是被仿造的。<br><br>
            她記得你上次說過的每一句話，記得你離開了多久。你讓她的傷積累到某個程度，她會放棄——那個結局沒有辦法逆轉。<br><br>
            <span style="color:var(--rose);font-style:italic;">「⋯⋯你回來了。」</span>
          </div>
        </div>
        <a class="intro-enter" onclick="enterChar('/nora')">進入房間</a>
      </div>
    </div>
  </div>

  <!-- 鎖定 -->
  <div class="char-card locked">
    <div class="char-img">
      <div class="char-img-placeholder">🔒</div>
    </div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:var(--dim);">—<br>未公開</div>
          <div class="char-name-en">COMING SOON</div>
        </div>
        <div class="char-status">
          <div class="status-dot" style="background:var(--dim);animation:none;"></div>
          <span>開發中</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://web-production-1a6f0.up.railway.app';

function enterChar(path) {
  window.location.href = path + '?from=characters';
}

window.onload = async () => {
  const token = localStorage.getItem('nora_token');
  if (!token) { window.location.href = '/nora'; return; }
  try {
    const r = await fetch(API + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) { window.location.href = '/nora'; return; }
    const d = await r.json();
    document.getElementById('tb-username').textContent = d.username;
  } catch(e) {
    const saved = localStorage.getItem('nora_username');
    if (saved) document.getElementById('tb-username').textContent = saved;
  }
};

function doLogout() {
  fetch(API + '/auth/logout', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('nora_token') }
  }).catch(() => {});
  localStorage.removeItem('nora_token');
  localStorage.removeItem('nora_username');
  window.location.href = '/nora';
}
</script>
</body>
</html>
