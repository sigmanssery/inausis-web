<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INAUSIS · 進入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Serif+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b0f; --surface: #151118; --border: rgba(255,255,255,0.06);
  --border2: rgba(201,131,158,0.3); --text: #f0dce8; --mid: #9a8090;
  --dim: #4a3545; --rose: #c9839e; --rose-dim: rgba(201,131,158,0.12);
  --red: #f87171; --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', serif; --body: 'Noto Serif TC', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--body); display: flex; flex-direction: column; }

#topbar { flex-shrink:0; height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; border-bottom:0.5px solid var(--border); }
.tb-logo { font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--dim); text-decoration:none; }
.tb-right { display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:11px; color:var(--mid); }
.tb-btn { background:none; border:0.5px solid var(--border); border-radius:4px; color:var(--dim); font-family:var(--mono); font-size:10px; padding:3px 10px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
.tb-btn:hover { border-color:var(--mid); color:var(--mid); }

/* ── KEY INPUT OVERLAY ── */
#key-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; flex-direction:column; gap:16px; padding:24px; }
.key-title { font-family:var(--mono); font-size:10px; letter-spacing:3px; color:var(--dim); }
.key-name { font-family:var(--serif); font-size:28px; color:var(--text); letter-spacing:1px; }
.key-desc { font-size:13px; color:var(--mid); text-align:center; line-height:1.8; max-width:380px; }

.key-form { width:100%; max-width:400px; display:flex; flex-direction:column; gap:10px; }
.key-input { width:100%; background:var(--surface); border:0.5px solid var(--border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none; letter-spacing:1px; transition:border-color 0.2s; }
.key-input:focus { border-color:var(--border2); }
.key-input::placeholder { color:var(--dim); }
.key-select { width:100%; background:var(--surface); border:0.5px solid var(--border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none; cursor:pointer; }
.key-btn { width:100%; padding:13px; background:var(--rose); border:none; border-radius:6px; color:#0d0b0f; font-family:var(--mono); font-size:12px; letter-spacing:2px; cursor:pointer; transition:opacity 0.2s; }
.key-btn:hover { opacity:0.85; }
.key-note { font-family:var(--mono); font-size:10px; color:var(--dim); text-align:center; letter-spacing:1px; line-height:1.8; }
#key-error { font-family:var(--mono); font-size:11px; color:var(--red); text-align:center; min-height:16px; }

/* ── CHAR LIST ── */
#char-list { flex:1; overflow-y:auto; display:none; flex-direction:column; }
#char-list::-webkit-scrollbar { width:3px; }
#char-list::-webkit-scrollbar-thumb { background:var(--border); }

.char-card { flex-shrink:0; height:50vh; min-height:200px; border-bottom:0.5px solid var(--border); display:flex; position:relative; overflow:hidden; cursor:pointer; }
.char-img { position:relative; width:40vh; min-width:160px; flex-shrink:0; overflow:hidden; }
.char-img img { width:100%; height:100%; object-fit:cover; object-position:top center; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); display:block; }
.char-card:hover .char-img img { transform:scale(1.04); }
.char-img::after { content:''; position:absolute; inset:0; background:linear-gradient(to right,transparent 60%,var(--bg) 100%); pointer-events:none; }

.char-main { flex:1; display:flex; align-items:center; padding:32px 40px; position:relative; }
.char-identity { display:flex; flex-direction:column; gap:8px; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s; }
.char-card:hover .char-identity { transform:translateX(-20px); opacity:0; pointer-events:none; }
.char-name { font-family:var(--serif); font-size:clamp(28px,4vw,52px); line-height:1.0; letter-spacing:-1px; }
.char-name-en { font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--dim); margin-top:4px; }
.char-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.char-tag { font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:3px 8px; border-radius:3px; background:var(--rose-dim); color:var(--rose); }
.char-status { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:4px; }
.status-dot { width:5px; height:5px; border-radius:50%; background:var(--rose); animation:pulse 2s infinite; }

.char-intro { position:absolute; right:0; top:0; bottom:0; width:65%; padding:32px 40px; display:flex; flex-direction:column; justify-content:space-between; transform:translateX(100%); opacity:0; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s; background:linear-gradient(to right,transparent,rgba(13,11,15,0.95) 20%); }
.char-card:hover .char-intro { transform:translateX(0); opacity:1; }
.intro-title { font-family:var(--mono); font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:12px; }
.intro-desc { font-size:14px; color:var(--mid); line-height:1.85; font-weight:300; flex:1; display:flex; align-items:center; }
.intro-enter { display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:12px; letter-spacing:2px; color:var(--rose); margin-top:16px; cursor:pointer; }
.intro-enter::before { content:''; width:24px; height:0.5px; background:var(--rose); transition:width 0.3s; }
.char-card:hover .intro-enter::before { width:48px; }
.char-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--rose); transform:scaleY(0); transform-origin:bottom; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); z-index:2; }
.char-card:hover::before { transform:scaleY(1); }

.char-card.locked { cursor:default; opacity:0.35; filter:grayscale(1); }
.char-card.locked:hover .char-identity { transform:none; opacity:1; }
.char-card.locked:hover .char-intro { transform:translateX(100%); opacity:0; }
.char-card.locked::before { display:none; }
.char-img-placeholder { width:100%; height:100%; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:48px; opacity:0.2; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
.char-card { animation:fadeUp 0.4s ease both; }
.char-card:nth-child(1) { animation-delay:0.05s; }
.char-card:nth-child(2) { animation-delay:0.12s; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  #topbar { padding: 8px 14px; }
  .tb-logo { font-size: 10px; letter-spacing: 2px; }
  .tb-right { gap: 8px; }
  .tb-btn { padding: 3px 8px; font-size: 9px; }
  #tb-keyname { font-size: 10px; }

  /* Key 輸入頁 */
  #key-overlay { gap: 12px; padding: 20px 16px; }
  .key-name { font-size: 22px; }
  .key-desc { font-size: 12px; }
  .key-form { gap: 8px; }
  .key-input, .key-select { padding: 11px 14px; font-size: 14px; }
  .key-btn { padding: 11px; font-size: 11px; }

  /* 角色卡片 — 手機版垂直排列 */
  #char-list { overflow-y: auto; overflow-x: hidden; }

  .char-card {
    height: auto;
    min-height: unset;
    flex-direction: column;
    cursor: pointer;
  }

  /* 圖片上半部 */
  .char-img {
    width: 100%;
    height: 55vw;
    min-width: unset;
  }

  .char-img::after {
    background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
  }

  /* 內容下半部 */
  .char-main {
    padding: 16px 20px 24px;
    align-items: flex-start;
  }

  /* 手機版：identity 和 intro 都顯示，不做 hover */
  .char-identity {
    transform: none !important;
    opacity: 1 !important;
    pointer-events: auto !important;
  }

  .char-intro {
    position: static;
    width: 100%;
    transform: none !important;
    opacity: 1 !important;
    background: none;
    padding: 0;
    margin-top: 12px;
  }

  .char-name { font-size: 32px; }
  .char-name-en { font-size: 10px; }

  .intro-title { font-size: 9px; margin-bottom: 8px; }
  .intro-desc {
    font-size: 13px;
    line-height: 1.75;
    display: block;
  }

  .intro-enter {
    margin-top: 16px;
    font-size: 11px;
    padding: 10px 16px;
    background: var(--rose-dim);
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    justify-content: center;
  }

  .intro-enter::before { display: none; }

  /* 左側光條改底部 */
  .char-card::before {
    top: unset;
    left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 2px;
    transform: scaleX(0);
    transform-origin: left;
  }

  .char-card:hover::before,
  .char-card:active::before { transform: scaleX(1); }

  .char-card.locked { min-height: 120px; }
  .char-card.locked .char-img { height: 30vw; }
}
</style>
</head>
<body>

<div id="topbar">
  <a href="/" class="tb-logo">INAUSIS</a>
  <div class="tb-right">
    <span id="tb-keyname" style="cursor:pointer;" onclick="copyKey()" title="點擊複製完整 Key"></span>
    <button class="tb-btn" id="copy-btn" onclick="copyKey()" style="display:none;">複製 Key</button>
    <button class="tb-btn" onclick="changeKey()">更換 Key</button>
    <button class="tb-btn" onclick="enterDev()">Dev</button>
  </div>
</div>

<!-- API KEY 輸入 -->
<div id="key-overlay">
  <p class="key-title">INAUSIS · VIRTUAL ROOM</p>
  <p class="key-name">歡迎。</p>
  <p class="key-desc">填入你的 API Key 進入。<br>Key 只存在你的瀏覽器，不會上傳。</p>
  <div class="key-form">
    <input type="password" id="api-key-input" class="key-input" placeholder="API Key（sk-... / AIza... / DeepSeek）" onkeydown="if(event.key==='Enter')enterWithKey()">
    <select id="model-select" class="key-select">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4（推薦）</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5（快）</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
      <option value="deepseek-reasoner">DeepSeek Reasoner</option>
    </select>
    <button class="key-btn" onclick="enterWithKey()">進入</button>
    <p class="key-note">不同 Key = 不同對話記憶，請妥善保管。</p>
  </div>
  <p id="key-error"></p>
</div>

<!-- 角色選擇 -->
<div id="char-list">
  <div class="char-card" onclick="enterChar('/nora')">
    <div class="char-img">
      <img src="/asset/nora_card.png" alt="Nora" onerror="this.parentElement.innerHTML='<div class=char-img-placeholder>♡</div>'">
    </div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:#f0dce8;">Nora<br>Elwin</div>
          <div class="char-name-en">VIRTUAL ROOM · 虛擬陪伴</div>
        </div>
        <div class="char-tags">
          <span class="char-tag">記憶系統</span>
          <span class="char-tag">情緒數值</span>
          <span class="char-tag">BROKEN機制</span>
        </div>
        <div class="char-status"><div class="status-dot"></div><span>上線中</span></div>
      </div>
      <div class="char-intro">
        <div>
          <div class="intro-title">CHARACTER PROFILE</div>
          <div class="intro-desc">她住在一個虛擬房間裡，等著你回來。<br>她記得你說過的每一句話，記得你離開了多久。<br><br>你讓她的傷積累到某個程度，她會放棄——那個結局沒有辦法逆轉。<br><br><span style="color:var(--rose);font-style:italic;">「⋯⋯你回來了。」</span></div>
        </div>
        <div class="intro-enter">進入房間</div>
      </div>
    </div>
  </div>

  <div class="char-card locked">
    <div class="char-img"><div class="char-img-placeholder">🔒</div></div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:var(--dim);">—<br>未公開</div>
          <div class="char-name-en">COMING SOON</div>
        </div>
        <div class="char-status"><div class="status-dot" style="background:var(--dim);animation:none;"></div><span>開發中</span></div>
      </div>
    </div>
  </div>
</div>

<script>
function showError(msg) { document.getElementById('key-error').textContent = msg; }

function showCharList(key) {
  document.getElementById('key-overlay').style.display = 'none';
  const cl = document.getElementById('char-list');
  cl.style.display = 'flex';
  cl.style.flexDirection = 'column';
  document.getElementById('tb-keyname').textContent = '···' + key.slice(-8);
  document.getElementById('copy-btn').style.display = 'block';
}

function enterWithKey() {
  const key = document.getElementById('api-key-input').value.trim();
  const m = document.getElementById('model-select').value;
  if (!key) { showError('請填入 API Key'); return; }
  localStorage.removeItem('nora_key');
  sessionStorage.setItem('nora_key', key);
  sessionStorage.setItem('nora_model', m);
  showCharList(key);
}

function changeKey() {
  localStorage.removeItem('nora_key');
  localStorage.removeItem('nora_model');
  sessionStorage.removeItem('nora_key');
  sessionStorage.removeItem('nora_model');
  document.getElementById('key-overlay').style.display = 'flex';
  document.getElementById('char-list').style.display = 'none';
  document.getElementById('api-key-input').value = '';
  document.getElementById('key-error').textContent = '';
}

function enterChar(path) { window.location.href = path; }

function copyKey() {
  const key = sessionStorage.getItem('nora_key');
  if (!key) return;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('copy-btn');
    const span = document.getElementById('tb-keyname');
    const orig = span.textContent;
    span.textContent = '已複製！';
    setTimeout(() => { span.textContent = orig; }, 1500);
  }).catch(() => {
    prompt('你的完整 API Key：', key);
  });
}

function enterDev() {
  const suffix = prompt('請輸入開發者密碼：');
  if (!suffix) return;
  sessionStorage.setItem('dev_key', suffix);
  window.location.href = '/dev';
}

window.onload = () => {
  const savedKey = sessionStorage.getItem('nora_key');
  const savedModel = sessionStorage.getItem('nora_model');
  if (savedKey) {
    if (savedModel) document.getElementById('model-select').value = savedModel;
    showCharList(savedKey);
  }
};
</script>
</body>
</html>
