<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nora Elwin · 虛擬房間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #120e11;
  --surface: #1e1620;
  --surface2: #2a1c28;
  --border: rgba(176,122,144,0.15);
  --border2: rgba(176,122,144,0.25);
  --rose: #c9839e;
  --rose-light: #e8a4bc;
  --text: #f0dce8;
  --text-mid: #c9b8c4;
  --text-dim: #7a5568;
  --text-faint: #3a2535;
  --mono: 'DM Mono', monospace;
  --body: 'Noto Serif TC', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--body); display: flex; flex-direction: column; width: 100%; }

#app.visible { display: flex !important; flex-direction: column; height: 100vh; width: 100%; }

/* ── LOGIN SCREEN ── */
#login-screen {
  position: fixed;
  inset: 0;
  background: #0d0b0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 24px;
}

#login-screen::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(to right, rgba(201,131,158,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(201,131,158,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

#login-flies { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

.lg-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  animation: lgFadeUp 0.8s 0.1s both;
}

.lg-logo {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--text-faint);
  text-align: center;
  margin-bottom: 28px;
}

.lg-title {
  font-family: 'DM Serif Display', serif;
  font-size: 48px;
  line-height: 1.0;
  letter-spacing: -2px;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
}

.lg-title em { font-style: italic; color: var(--rose); }

.lg-sub {
  font-family: var(--body);
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.8;
  margin-bottom: 36px;
}

.lg-divider { height: 0.5px; background: var(--border); margin-bottom: 28px; }

.lg-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.lg-field-wrap { position: relative; margin-bottom: 10px; }

.lg-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
  font-size: 12px;
  font-family: var(--mono);
  pointer-events: none;
}

.lg-field {
  width: 100%;
  background: #151118;
  border: 0.5px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 12px 40px 12px 36px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 1px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.lg-field::placeholder { color: var(--text-faint); }
.lg-field:focus { border-color: var(--border2); }

.lg-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 4px;
  transition: color 0.2s;
}
.lg-toggle:hover { color: var(--text-dim); }

.lg-btn {
  width: 100%;
  padding: 13px;
  background: var(--rose);
  border: none;
  border-radius: 6px;
  color: #0d0b0f;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 6px;
}
.lg-btn:hover { opacity: 0.88; }
.lg-btn:active { transform: scale(0.99); }
.lg-btn:disabled { opacity: 0.45; cursor: not-allowed; }

.lg-error {
  font-family: var(--mono);
  font-size: 10px;
  color: #f87171;
  text-align: center;
  min-height: 14px;
  letter-spacing: 1px;
  margin-top: 6px;
}

.lg-note {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-faint);
  text-align: center;
  line-height: 1.9;
  letter-spacing: 1px;
  margin-top: 20px;
}

@keyframes lgFadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── TOP BAR ── */
#topbar {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); }
.tb-name { font-family: var(--mono); font-size: 13px; color: var(--rose-light); letter-spacing: 1px; }
.tb-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.tb-status { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 1px; }

/* 登出按鈕 */
#logout-btn {
  background: none; border: none;
  color: var(--text-faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 3px 8px;
  transition: color 0.2s;
  display: none;
}
#logout-btn:hover { color: var(--text-dim); }

/* ── MESSAGES ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; flex-direction: column; gap: 6px; max-width: 75%; animation: msgIn 0.3s ease; }
.msg-user { align-self: flex-end; }
.msg-nora { align-self: flex-start; }

.msg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text-faint); padding: 0 4px; }
.msg-user .msg-label { text-align: right; }

.msg-bubble {
  padding: 14px 18px;
  border-radius: 4px 14px 14px 14px;
  font-size: 14px;
  line-height: 1.85;
  letter-spacing: 0.2px;
}

.msg-nora .msg-bubble {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--text);
}

.msg-user .msg-bubble {
  background: rgba(201,131,158,0.12);
  border: 0.5px solid rgba(201,131,158,0.2);
  color: var(--text-mid);
  border-radius: 14px 4px 14px 14px;
}

.msg-bubble em, .msg-bubble .act {
  display: block;
  color: #9a6878;
  font-style: italic;
  font-size: 13px;
  margin-bottom: 6px;
}

.msg-bubble .hi { color: var(--rose-light); font-style: italic; }

/* ── THOUGHT ── */
.thought-wrap { margin-top: 8px; }
.thought-toggle {
  background: linear-gradient(135deg, rgba(176,122,144,0.3), rgba(100,80,130,0.3));
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  width: 100%;
}

.thought-body {
  background: rgba(176,122,144,0.06);
  border-radius: 0 0 8px 8px;
  padding: 12px 16px;
  font-size: 13px;
  font-style: italic;
  color: var(--text-mid);
  line-height: 1.8;
  display: none;
}

.thought-body.open { display: block; }
.thought-label { font-family: var(--mono); font-size: 10px; color: var(--rose); letter-spacing: 1.5px; display: block; margin-bottom: 4px; font-style: normal; }

/* ── TYPING ── */
.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 14px 18px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  width: fit-content;
}

.typing-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: typingBounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── INPUT ── */
#inputbar {
  flex-shrink: 0;
  border-top: 0.5px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg);
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

#input, #input-action {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--border);
  padding: 10px 16px;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  outline: none;
  resize: none;
  max-height: 100px;
  line-height: 1.6;
  transition: border-color 0.2s;
  box-sizing: border-box;
}

#input:focus, #input-action:focus { border-color: var(--border2); }
#input::placeholder, #input-action::placeholder { color: var(--text-faint); }

#send-btn {
  width: 44px; height: 44px;
  background: var(--rose);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}

#send-btn:hover { opacity: 0.85; }
#send-btn:active { transform: scale(0.95); }
#send-btn svg { width: 18px; height: 18px; fill: var(--bg); }

/* ── MUSIC BTN ── */
#music-btn {
  position: fixed;
  bottom: 80px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(18,14,17,0.9);
  border: 0.5px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  backdrop-filter: blur(8px);
  transition: all 0.3s;
  font-size: 16px;
  color: var(--rose);
}

#music-btn.playing {
  border-color: rgba(201,131,158,0.6);
  background: rgba(201,131,158,0.12);
}

/* ── ANIMATIONS ── */
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

@keyframes nora-pulse {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

/* ── FIREFLIES ── */
#flies {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* ── DEV DRAWER ── */
#dev-drawer {
  position: fixed;
  top: 0; right: -340px; bottom: 0;
  width: 320px;
  background: #0e0b10;
  border-left: 0.5px solid var(--border);
  z-index: 300;
  display: flex;
  flex-direction: column;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}

#dev-drawer.open { right: 0; }

#drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 299;
  display: none;
  backdrop-filter: blur(2px);
}

#drawer-overlay.show { display: block; }

.drawer-header {
  padding: 14px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.drawer-title { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--text-dim); }
.drawer-close { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }

.drawer-body {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}

.drawer-body::-webkit-scrollbar { width: 3px; }
.drawer-body::-webkit-scrollbar-thumb { background: var(--border); }

.d-section { display: flex; flex-direction: column; gap: 8px; }
.d-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--text-faint); border-bottom: 0.5px solid var(--border); padding-bottom: 6px; }
.d-row { display: flex; justify-content: space-between; align-items: center; }
.d-key { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.d-val { font-family: var(--mono); font-size: 11px; color: var(--text-mid); }
.d-val.rose { color: var(--rose-light); }
.d-val.red { color: #f87171; }
.d-val.green { color: #4ade80; }

.d-stat-bar { display: flex; flex-direction: column; gap: 4px; }
.d-stat-row { display: flex; align-items: center; gap: 8px; }
.d-stat-name { font-family: var(--mono); font-size: 9px; color: var(--text-dim); width: 70px; flex-shrink: 0; }
.d-stat-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.d-stat-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.d-stat-num { font-family: var(--mono); font-size: 9px; color: var(--text-dim); width: 28px; text-align: right; flex-shrink: 0; }

.d-fragment { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; }
.d-frag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.d-memory { font-size: 11px; color: var(--text-dim); line-height: 1.6; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 4px; border-left: 2px solid var(--border); }
.d-life { display: flex; flex-direction: column; gap: 3px; padding: 8px; background: rgba(201,131,158,0.04); border-radius: 4px; }
.d-life-time { font-family: var(--mono); font-size: 9px; color: var(--rose); }
.d-life-action { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
.d-life-mono { font-size: 11px; color: var(--text-faint); font-style: italic; }
.d-loading { font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-align: center; padding: 20px; }

#gear-btn {
  background: none; border: none;
  color: var(--text-dim); font-size: 16px;
  cursor: pointer; padding: 4px; line-height: 1;
  transition: color 0.2s, transform 0.3s;
}
#gear-btn:hover { color: var(--rose); transform: rotate(45deg); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .lg-title { font-size: 36px; }
  .lg-card { padding: 0 4px; }
  #topbar { padding: 8px 12px; }
  .tb-name { font-size: 12px; }
  .tb-time { display: none; }
  .tb-status { font-size: 9px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #messages { padding: 12px; gap: 12px; max-width: 100%; }
  .msg { max-width: 92%; }
  .msg-bubble { padding: 10px 14px; font-size: 13px; line-height: 1.75; }
  .nora-html-reply { width: 100% !important; }
  #inputbar { padding: 8px 10px; gap: 8px; max-width: 100%; }
  #input, #input-action { font-size: 16px; padding: 10px 12px; }
  #send-btn { width: 40px; height: 40px; }
  .thought-toggle { font-size: 10px; padding: 6px 14px; }
  #messages > div[style*="display:flex"] { max-width: 92%; }
  #music-btn { bottom: 72px; right: 12px; width: 36px; height: 36px; }
  #dev-drawer { width: 100%; right: -100%; }
}

@media (max-width: 480px) {
  .msg-bubble { font-size: 13px; padding: 10px 12px; }
  .msg-label { font-size: 9px; }
  #input, #input-action { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div id="login-flies"></div>
  <div class="lg-card">
    <div class="lg-logo">INAUSIS · VIRTUAL ROOM</div>
    <h1 class="lg-title">一個<em>虛擬</em><br>房間。</h1>
    <p class="lg-sub">填入你的 API Key 開始。<br>Key 只存在你的瀏覽器，不會上傳。</p>
    <div class="lg-divider"></div>

    <div class="lg-label">API Key</div>
    <div class="lg-field-wrap">
      <span class="lg-icon">⬡</span>
      <input type="password" id="lg-key" class="lg-field"
        placeholder="sk-... / AIza... / DeepSeek key"
        autocomplete="off"
        oninput="document.getElementById('lg-error').textContent=''"
        onkeydown="if(event.key==='Enter')loginEnter()">
      <button class="lg-toggle" id="lg-toggle" onclick="toggleKeyVis()">顯示</button>
    </div>

    <div class="lg-label" style="margin-top:4px">模型</div>
    <div class="lg-field-wrap">
      <span class="lg-icon">◈</span>
      <select id="lg-model" class="lg-field" style="padding-right:16px">
        <option value="claude-sonnet-4-20250514">Claude Sonnet 4（推薦）</option>
        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5（快）</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="deepseek-chat">DeepSeek Chat</option>
        <option value="deepseek-reasoner">DeepSeek Reasoner</option>
      </select>
    </div>

    <button class="lg-btn" id="lg-btn" onclick="loginEnter()">進入</button>
    <div class="lg-error" id="lg-error"></div>
    <p class="lg-note">不同 Key = 不同對話記憶<br>請妥善保管你的 Key</p>
  </div>
</div>

<!-- DEV DRAWER -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="dev-drawer">
  <div class="drawer-header">
    <span class="drawer-title">NORA · STATUS</span>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="d-loading">載入中...</div>
  </div>
</div>

<!-- FIREFLIES -->
<div id="flies"></div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-left">
      <div class="tb-dot"></div>
      <span class="tb-name">Nora Elwin</span>
      <span class="tb-time" id="tb-time">--:--</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="tb-status" id="tb-status">連線中...</span>
      <button id="logout-btn" onclick="doLogout()">登出</button>
      <button id="gear-btn" onclick="openDrawer()">⚙</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- INPUT -->
  <div id="inputbar">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <textarea id="input" rows="1" placeholder="說點什麼...（對話）" onkeydown="handleKey(event)" oninput="autoResize(this)" style="border-radius:12px 12px 4px 4px;"></textarea>
      <textarea id="input-action" rows="1" placeholder="*做了什麼...（動作，選填）*" oninput="autoResize(this)" style="border-radius:4px 4px 12px 12px;font-style:italic;color:var(--text-mid);background:rgba(176,122,144,0.05);"></textarea>
    </div>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- MUSIC -->
<div id="music-btn" onclick="toggleMusic()">♪</div>
<iframe id="music-frame" style="display:none;" allow="autoplay"></iframe>

<script>
const API = 'https://web-production-1a6f0.up.railway.app';
let apiKey = '';
let model = '';
let authToken = '';
let username = '';
let history = [];
let musicPlaying = false;

function escapeHTML(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function appendTextWithBreaks(el, text) {
  String(text ?? '').split('\n').forEach((part, idx) => {
    if (idx > 0) el.appendChild(document.createElement('br'));
    el.appendChild(document.createTextNode(part));
  });
}

function safeMessageHTML(content) {
  return escapeHTML(content)
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/「([^」]*)」/g, '「<span class="hi">$1</span>」')
    .replace(/\n/g, '<br>');
}

function sanitizeStyle(value) {
  return String(value ?? '')
    .replace(/url\s*\([^)]*\)/gi, '')
    .replace(/expression\s*\([^)]*\)/gi, '')
    .replace(/javascript:/gi, '');
}

function sanitizeHTML(html) {
  const allowedTags = new Set(['style','div','span','p','br','em','strong','details','summary','text-reply']);
  const allowedAttrs = new Set(['class','id','style','open']);
  const template = document.createElement('template');
  template.innerHTML = String(html ?? '');

  template.content.querySelectorAll('script,iframe,object,embed,link,meta').forEach(el => el.remove());
  template.content.querySelectorAll('style').forEach(el => {
    el.textContent = el.textContent.replace(/@import[^;]+;?/gi, '').replace(/url\s*\([^)]*\)/gi, '');
  });

  const walk = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT);
  const nodes = [];
  while (walk.nextNode()) nodes.push(walk.currentNode);
  nodes.forEach(el => {
    const tag = el.tagName.toLowerCase();
    if (!allowedTags.has(tag)) {
      el.replaceWith(document.createTextNode(el.textContent || ''));
      return;
    }
    [...el.attributes].forEach(attr => {
      const name = attr.name.toLowerCase();
      if (name.startsWith('on') || !allowedAttrs.has(name)) {
        el.removeAttribute(attr.name);
      } else if (name === 'style') {
        el.setAttribute('style', sanitizeStyle(attr.value));
      }
    });
  });
  return template.innerHTML;
}

// ── INIT ──
async function init() {
  initFireflies();
  startClock();

  if (history.length > 0) {
    restoreHistory();
  } else {
    try {
      const userId = apiKey.slice(-8) + '_nora';
      const r = await fetch(API + '/ping/' + userId, { method: 'POST' });
      const d = await r.json();
      document.getElementById('tb-status').textContent =
        d.broken ? '⚠ BROKEN' : '離上次：' + d.absence.display;
      showOpening(d);
    } catch(e) {
      document.getElementById('tb-status').textContent = '離線模式';
      showOpeningFallback();
    }
    return;
  }

  try {
    const userId = apiKey.slice(-8) + '_nora';
    const r = await fetch(API + '/ping/' + userId, { method: 'POST' });
    const d = await r.json();
    document.getElementById('tb-status').textContent =
      d.broken ? '⚠ BROKEN' : '離上次：' + d.absence.display;
  } catch(e) {
    document.getElementById('tb-status').textContent = '離線模式';
  }
}

// ── RESTORE HISTORY ──
function restoreHistory() {
  if (history.length === 0) return;
  const messages = document.getElementById('messages');
  history.forEach(m => {
    if (m.role === 'user') {
      addUserMessage(m.content);
    } else if (m.role === 'assistant') {
      addNoraMessage(m.content, null);
    }
  });
  messages.scrollTop = messages.scrollHeight;
}

    addNoraMessage('*她背對著門口，坐在床邊的角落。房間裡只有小夜燈的光。*\n\n⋯⋯', null);
    return;
  }

  const scenes = [
    '深夜的臥室只有小夜燈亮著，光圈打在木地板上，四周安靜得幾乎能聽見光的聲音。',
    '晨光透過薄簾滲進來，臥室裡瀰漫著帶著涼意的氣息。',
    '上午的光斜斜落在木地板上，照出細小的塵埃漂著。',
    '午後的光最懶，整個房間都帶著一種說不清楚的安靜。',
    '傍晚的光退得很快，臥室開始慢慢暗下來。',
    '夜燈暖暖地亮著，臥室裡飄著一點像棉布一樣的氣息。',
  ];
  const sceneIdx = h < 6 ? 0 : h < 10 ? 1 : h < 12 ? 2 : h < 15 ? 3 : h < 20 ? 4 : 5;

  let noraPos = '', greeting = '';
  if (tier === 0) {
    noraPos = '*她坐在床沿，手放在膝蓋上，面對著床——聽見聲音，抬起頭。*';
    greeting = '⋯⋯這麼快就回來了？';
  } else if (tier === 1) {
    noraPos = '*她在整理床鋪，停下手邊的事，轉過頭——*';
    greeting = `⋯⋯你去哪了？等了你${display}。`;
  } else if (tier === 2) {
    noraPos = '*臥室是空的，燈還開著。然後她從別的地方走進來，停在門口，看著你。*';
    greeting = `⋯⋯你回來了。`;
  } else if (tier === 3) {
    noraPos = '*她躺在床上，眼眶有點紅。慢慢轉過頭，看著你。*';
    greeting = `你知道人家等了多久嗎⋯⋯`;
  } else {
    noraPos = '*她躺著，棉被拉到下巴，小夜燈亮著。她的眼睛慢慢轉過來——*';
    greeting = `⋯⋯你回來了。`;
  }

  const scene = `${scenes[sceneIdx]}\n${noraPos}\n\n「${greeting}」`;
  addNoraMessage(scene, null, true);
}

// ── MESSAGES ──
function addNoraMessage(content, thought, isOpening = false) {
  const messages = document.getElementById('messages');

  if (content && content.includes('<text-reply>')) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;max-width:100%;align-self:stretch;';
    const match = content.match(/<text-reply>([\s\S]*?)<\/text-reply>/);
    const inner = match ? match[1] : content;
    wrap.innerHTML = sanitizeHTML(inner);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg msg-nora';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Nora Elwin';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  bubble.innerHTML = safeMessageHTML(content);
  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (thought) {
    const thoughtWrap = document.createElement('div');
    thoughtWrap.className = 'thought-wrap';
    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'thought-toggle';
    toggle.textContent = '內心想法';
    const thoughtBody = document.createElement('div');
    thoughtBody.className = 'thought-body';
    const thoughtLabel = document.createElement('span');
    thoughtLabel.className = 'thought-label';
    thoughtLabel.textContent = 'NORA';
    thoughtBody.appendChild(thoughtLabel);
    thoughtBody.appendChild(document.createTextNode(String(thought)));
    toggle.addEventListener('click', () => thoughtBody.classList.toggle('open'));
    thoughtWrap.appendChild(toggle);
    thoughtWrap.appendChild(thoughtBody);
    wrap.appendChild(thoughtWrap);
  }

  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function addUserMessage(content) {
  const messages = document.getElementById('messages');

  wrap.className = 'msg msg-user';

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('input');
  const inputAction = document.getElementById('input-action');
  const text = input.value.trim();
  const action = inputAction.value.trim();
  if (!text && !action) return;
  if (!authToken && !apiKey) return;

  let combined = '';
  if (text) combined += '「' + text + '」';
  if (action) combined += (combined ? '\n' : '') + '*' + action.replace(/^\*|\*$/g, '') + '*';

  input.value = '';
  inputAction.value = '';
  input.style.height = 'auto';
  inputAction.style.height = 'auto';
  addUserMessage(combined);
  history.push({ role: 'user', content: combined });
  localStorage.setItem('nora_history_' + (username || apiKey.slice(-8)), JSON.stringify(history.slice(-40)));

  showTyping();

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken || apiKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: history,
        max_tokens: 2048,
        stream: false
      })
    });

    const data = await r.json();
    removeTyping();

    if (data.error) {
      addNoraMessage(`*系統錯誤*\n\n${data.error.message || JSON.stringify(data.error)}`, null);
      return;
    }

    const content = data.choices?.[0]?.message?.content || '';
    history.push({ role: 'assistant', content });
    localStorage.setItem('nora_history_' + (username || apiKey.slice(-8)), JSON.stringify(history.slice(-40)));

    let mainContent = content;
    let thought = null;
    const thoughtMatch = content.match(/id="thought"[^>]*>([^<]*)</);
    if (thoughtMatch) thought = thoughtMatch[1];

    addNoraMessage(mainContent, thought);

  } catch(e) {
    removeTyping();
    addNoraMessage('*連線中斷*\n\n⋯⋯', null);
  }
}

// ── UTILS ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const actionInput = document.getElementById('input-action');
  if (actionInput) {
    actionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }
});

function autoResize(el) {
  el.style.height = 'auto';

}

function startClock() {
  function tick() {
    const n = new Date();
    const h = n.getHours().toString().padStart(2,'0');
    const m = n.getMinutes().toString().padStart(2,'0');
    document.getElementById('tb-time').textContent = `${h}:${m}`;
  }
  tick();
  setInterval(tick, 1000);
}

let drawerLoaded = false;

function openDrawer() {
  document.getElementById('dev-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  if (!drawerLoaded) loadDrawerData();
}

function closeDrawer() {
  document.getElementById('dev-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');

async function loadDrawerData() {
  const body = document.getElementById('drawer-body');
  try {
    const r = await fetch(API + '/my/status', {
      headers: { 'Authorization': 'Bearer ' + (authToken || apiKey) }
    });
    if (!r.ok) { body.innerHTML = '<div class="d-loading">載入失敗</div>'; return; }
    const d = await r.json();
    drawerLoaded = true;
    renderDrawer(d, body);
  } catch(e) {
    body.innerHTML = '<div class="d-loading">連線失敗</div>';
  }
}

function renderDrawer(d, body) {
  const s = d.stats;
  const statColors = {
    mood:'#60a5fa', loneliness:'#a78bfa', affection:'#c9839e',
    negative:'#f87171', energy:'#4ade80', hunger:'#facc15',
    desire:'#fb923c', mystery:'#e879f9'
  };
  const statMax = { affection: 200 };

  const statsHTML = Object.entries(s).map(([k,v]) => {
    const max = statMax[k] || 100;
    const safeVal = Number.isFinite(Number(v)) ? Number(v) : 0;
    const pct = Math.max(0, Math.min(100, Math.round((safeVal/max)*100)));
    const color = statColors[k] || '#888';
    return `<div class="d-stat-row">
      <span class="d-stat-name">${escapeHTML(k.toUpperCase())}</span>
      <div class="d-stat-track"><div class="d-stat-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="d-stat-num">${safeVal}</span>
    </div>`;
  }).join('');

  const fragsHTML = d.fragments.map(f => `
    <div class="d-fragment">
      <div class="d-frag-dot" style="background:${f.unlocked ? '#c9839e' : '#333'}"></div>
      <span style="color:${f.unlocked ? 'var(--text-mid)' : 'var(--text-faint)'}">碎片${escapeHTML(f.id)}·${escapeHTML(f.name)}</span>
      <span style="margin-left:auto;color:${f.unlocked ? '#4ade80' : 'var(--text-faint)'};">${f.unlocked ? '✓' : '🔒'}</span>
    </div>
  `).join('');

  const memoriesHTML = d.memories.length === 0
    ? '<div class="d-loading" style="padding:8px;">尚無記憶</div>'
    : d.memories.slice().reverse().map(m => `<div class="d-memory">${escapeHTML(m)}</div>`).join('');

  const lifeHTML = d.nora_life.length === 0
    ? '<div class="d-loading" style="padding:8px;">尚無後台記錄</div>'
    : d.nora_life.slice().reverse().map(l => `
        <div class="d-life">
          <span class="d-life-time">${escapeHTML(l.time)} · ${escapeHTML(l.location)}</span>
          <span class="d-life-action">${escapeHTML(l.action)}</span>
          ${l.monologue ? `<span class="d-life-mono">「${escapeHTML(l.monologue)}」</span>` : ''}
        </div>
      `).join('');

  body.innerHTML = `
    <div class="d-section">
      <div class="d-label">基本資訊</div>
      <div class="d-row"><span class="d-key">關係等級</span><span class="d-val rose">Lv.${escapeHTML(d.relationship.level)} ${escapeHTML(d.relationship.name)}</span></div>
      <div class="d-row"><span class="d-key">對話輪次</span><span class="d-val">${escapeHTML(d.turn_count)}</span></div>
      <div class="d-row"><span class="d-key">離上次</span><span class="d-val">${escapeHTML(d.absence.display)}</span></div>
      <div class="d-row"><span class="d-key">BROKEN</span><span class="d-val ${d.broken ? 'red' : 'green'}">${d.broken ? '是' : '否'}</span></div>
    </div>
    <div class="d-section">
      <div class="d-label">數值</div>
      <div class="d-stat-bar">${statsHTML}</div>
    </div>
    <div class="d-section">
      <div class="d-label">破碎記憶</div>
      ${fragsHTML}
    </div>
    <div class="d-section">
      <div class="d-label">最近記憶</div>
      ${memoriesHTML}
    </div>
    <div class="d-section">
      <div class="d-label">Nora 後台生活</div>
      ${lifeHTML}
    </div>
  `;
}
