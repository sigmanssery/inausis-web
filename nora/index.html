<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nora Elwin · 虛擬房間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #120e11;
  --surface: #1e1620;
  --surface2: #2a1c28;
  --border: rgba(176,122,144,0.15);
  --border2: rgba(176,122,144,0.25);
  --rose: #c9839e;
  --rose-light: #e8a4bc;
  --text: #f0dce8;
  --text-mid: #c9b8c4;
  --text-dim: #7a5568;
  --text-faint: #3a2535;
  --mono: 'DM Mono', monospace;
  --body: 'Noto Serif TC', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
  width: 100%;
}

#app.visible {
  display: flex !important;
  flex-direction: column;
  height: 100vh;
  width: 100%;
}

/* body styles moved above */

/* ── SETUP SCREEN ── */
#setup {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  z-index: 200;
  padding: 24px;
}

.setup-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.setup-name {
  font-size: 32px;
  color: var(--text);
  letter-spacing: 2px;
}

.setup-desc {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.8;
  max-width: 360px;
}

.setup-input {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 14px 18px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  letter-spacing: 1px;
}

.setup-input:focus { border-color: var(--rose); }
.setup-input::placeholder { color: var(--text-faint); }

.setup-btn {
  width: 100%;
  max-width: 400px;
  padding: 14px;
  background: var(--rose);
  border: none;
  border-radius: 8px;
  color: var(--bg);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.setup-btn:hover { opacity: 0.85; }

.setup-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
  letter-spacing: 1px;
  max-width: 360px;
  line-height: 1.8;
}

/* ── TOP BAR ── */
#topbar {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); }
.tb-name { font-family: var(--mono); font-size: 13px; color: var(--rose-light); letter-spacing: 1px; }
.tb-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.tb-status { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 1px; }

/* ── MESSAGES ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; flex-direction: column; gap: 6px; max-width: 75%; animation: msgIn 0.3s ease; }
.msg-user { align-self: flex-end; }
.msg-nora { align-self: flex-start; }

.msg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text-faint); padding: 0 4px; }
.msg-user .msg-label { text-align: right; }

.msg-bubble {
  padding: 14px 18px;
  border-radius: 4px 14px 14px 14px;
  font-size: 14px;
  line-height: 1.85;
  letter-spacing: 0.2px;
}

.msg-nora .msg-bubble {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--text);
}

.msg-user .msg-bubble {
  background: rgba(201,131,158,0.12);
  border: 0.5px solid rgba(201,131,158,0.2);
  color: var(--text-mid);
  border-radius: 14px 4px 14px 14px;
}

.msg-bubble em, .msg-bubble .act {
  display: block;
  color: #9a6878;
  font-style: italic;
  font-size: 13px;
  margin-bottom: 6px;
}

.msg-bubble .hi { color: var(--rose-light); font-style: italic; }

/* ── THOUGHT ── */
.thought-wrap { margin-top: 8px; }
.thought-toggle {
  background: linear-gradient(135deg, rgba(176,122,144,0.3), rgba(100,80,130,0.3));
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  width: 100%;
}

.thought-body {
  background: rgba(176,122,144,0.06);
  border-radius: 0 0 8px 8px;
  padding: 12px 16px;
  font-size: 13px;
  font-style: italic;
  color: var(--text-mid);
  line-height: 1.8;
  display: none;
}

.thought-body.open { display: block; }
.thought-label { font-family: var(--mono); font-size: 10px; color: var(--rose); letter-spacing: 1.5px; display: block; margin-bottom: 4px; font-style: normal; }

/* ── TYPING ── */
.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 14px 18px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  width: fit-content;
}

.typing-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: typingBounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── INPUT ── */
#inputbar {
  flex-shrink: 0;
  border-top: 0.5px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg);
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

#input {
  flex: 1;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  outline: none;
  resize: none;
  max-height: 120px;
  line-height: 1.6;
  transition: border-color 0.2s;
}

#input:focus { border-color: var(--border2); }
#input::placeholder { color: var(--text-faint); }

#send-btn {
  width: 44px; height: 44px;
  background: var(--rose);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}

#send-btn:hover { opacity: 0.85; }
#send-btn:active { transform: scale(0.95); }

#send-btn svg { width: 18px; height: 18px; fill: var(--bg); }

/* ── MUSIC BTN ── */
#music-btn {
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(18,14,17,0.9);
  border: 0.5px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  backdrop-filter: blur(8px);
  transition: all 0.3s;
  font-size: 16px;
  color: var(--rose);
}

#music-btn.playing {
  border-color: rgba(201,131,158,0.6);
  background: rgba(201,131,158,0.12);
}

/* ── ANIMATIONS ── */
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

@keyframes nora-pulse {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

/* ── FIREFLIES ── */
#flies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <p class="setup-title">Nora Elwin · 虛擬房間</p>
  <p class="setup-name" id="setup-title-text">歡迎回來。</p>
  <p class="setup-desc" id="setup-desc">登入後進入房間。沒有帳號？<span style="color:var(--rose);cursor:pointer;" onclick="switchMode('register')">點此註冊</span></p>

  <!-- 登入模式 -->
  <div id="login-mode">
    <input type="text" id="login-username" class="setup-input" placeholder="用戶名">
    <input type="password" id="login-password" class="setup-input" placeholder="密碼">
    <button class="setup-btn" onclick="doLogin()">登入</button>
    <p class="setup-note" style="cursor:pointer;color:var(--rose);" onclick="switchMode('apikey')">或者直接使用 API Key →</p>
  </div>

  <!-- 註冊模式 -->
  <div id="register-mode" style="display:none;">
    <input type="text" id="reg-username" class="setup-input" placeholder="用戶名（2~20字元，英數字）">
    <input type="password" id="reg-password" class="setup-input" placeholder="密碼（至少6字元）">
    <input type="password" id="reg-password2" class="setup-input" placeholder="確認密碼">
    <input type="text" id="reg-apikey" class="setup-input" placeholder="API Key（可之後再填）">
    <select id="reg-model" class="setup-input" style="cursor:pointer;">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (推薦)</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (快)</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
      <option value="deepseek-reasoner">DeepSeek Reasoner</option>
    </select>
    <button class="setup-btn" onclick="doRegister()">註冊並進入</button>
    <p class="setup-note" style="cursor:pointer;color:var(--rose);" onclick="switchMode('login')">← 返回登入</p>
  </div>

  <!-- API Key 模式（舊模式） -->
  <div id="apikey-mode" style="display:none;">
    <input type="password" id="key-input" class="setup-input" placeholder="sk-... 或 AIza... 或 DeepSeek Key">
    <select id="model-select" class="setup-input" style="cursor:pointer;">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (推薦)</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (快)</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
      <option value="deepseek-reasoner">DeepSeek Reasoner</option>
    </select>
    <button class="setup-btn" onclick="enterRoom()">進入房間</button>
    <p class="setup-note" style="cursor:pointer;color:var(--rose);" onclick="switchMode('login')">← 返回登入</p>
    <p class="setup-note">Key 只存在你的瀏覽器，不會傳到任何伺服器以外。</p>
  </div>

  <p id="setup-error" style="color:var(--red);font-size:12px;font-family:var(--mono);display:none;"></p>
</div>

<!-- FIREFLIES -->
<div id="flies"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-left">
    <div class="tb-dot"></div>
    <span class="tb-name">Nora Elwin</span>
    <span class="tb-time" id="tb-time">--:--</span>
  </div>
  <span class="tb-status" id="tb-status">連線中...</span>
</div>

<!-- MESSAGES -->
<div id="messages"></div>

<!-- INPUT -->
<div id="inputbar">
  <textarea id="input" rows="1" placeholder="說點什麼..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<!-- MUSIC -->
<div id="music-btn" onclick="toggleMusic()">♪</div>
<iframe id="music-frame" style="display:none;" allow="autoplay"></iframe>

<script>
const API = 'https://web-production-1a6f0.up.railway.app';
let apiKey = '';
let model = '';
let authToken = '';
let username = '';
let history = [];
let musicPlaying = false;

// ── SETUP MODE ──
function switchMode(mode) {
  document.getElementById('login-mode').style.display = mode === 'login' ? 'flex' : 'none';
  document.getElementById('register-mode').style.display = mode === 'register' ? 'flex' : 'none';
  document.getElementById('apikey-mode').style.display = mode === 'apikey' ? 'flex' : 'none';
  document.getElementById('setup-error').style.display = 'none';
  // 只對 login-mode 和 register-mode 設定 flex-direction
  if (mode === 'login' || mode === 'register') {
    document.getElementById(mode + '-mode').style.flexDirection = 'column';
    document.getElementById(mode + '-mode').style.gap = '12px';
    document.getElementById(mode + '-mode').style.width = '100%';
    document.getElementById(mode + '-mode').style.maxWidth = '400px';
  }
}

function showError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u || !p) { showError('請填入帳號和密碼'); return; }
  
  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const d = await r.json();
    if (!r.ok) { showError(d.detail || '登入失敗'); return; }
    
    authToken = d.token;
    username = d.username;
    apiKey = d.api_key || '';
    model = d.preferred_model || 'deepseek-chat';
    
    localStorage.setItem('nora_token', authToken);
    localStorage.setItem('nora_username', username);
    
    history = JSON.parse(localStorage.getItem('nora_history_' + username) || '[]');
    document.getElementById('setup').style.display = 'none';
    init();
  } catch(e) {
    showError('連線失敗，請稍後再試');
  }
}

async function doRegister() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value;
  const p2 = document.getElementById('reg-password2').value;
  const key = document.getElementById('reg-apikey').value.trim();
  const m = document.getElementById('reg-model').value;
  
  if (!u || !p) { showError('請填入用戶名和密碼'); return; }
  if (p !== p2) { showError('兩次密碼不一致'); return; }
  
  try {
    const r = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p, api_key: key, preferred_model: m })
    });
    const d = await r.json();
    if (!r.ok) { showError(d.detail || '註冊失敗'); return; }
    
    authToken = d.token;
    username = d.username;
    apiKey = key;
    model = m;
    
    localStorage.setItem('nora_token', authToken);
    localStorage.setItem('nora_username', username);
    
    history = [];
    document.getElementById('setup').style.display = 'none';
    init();
  } catch(e) {
    showError('連線失敗，請稍後再試');
  }
}

// 舊模式：直接用 API Key
function enterRoom() {
  const key = document.getElementById('key-input').value.trim();
  model = document.getElementById('model-select').value;
  if (!key) { alert('請填入 API Key'); return; }
  apiKey = key;
  authToken = key;  // 舊模式直接用 key 當 token
  username = key.slice(-8);
  localStorage.setItem('nora_key', key);
  localStorage.setItem('nora_model', model);
  history = JSON.parse(localStorage.getItem('nora_history_' + username) || '[]');
  document.getElementById('setup').style.display = 'none';
  init();
}

// 自動登入
window.onload = async () => {
  const savedToken = localStorage.getItem('nora_token');
  const savedUsername = localStorage.getItem('nora_username');
  
  if (savedToken && savedUsername) {
    // 嘗試用 token 自動登入
    try {
      const r = await fetch(API + '/auth/me', {
        headers: { 'Authorization': 'Bearer ' + savedToken }
      });
      if (r.ok) {
        const d = await r.json();
        authToken = savedToken;
        username = d.username;
        apiKey = d.api_key || '';
        model = d.preferred_model || 'deepseek-chat';
        history = JSON.parse(localStorage.getItem('nora_history_' + username) || '[]');
        document.getElementById('setup').style.display = 'none';
        init();
        return;
      }
    } catch(e) {}
  }
  
  // 舊模式 fallback
  const savedKey = localStorage.getItem('nora_key');
  const savedModel = localStorage.getItem('nora_model');
  if (savedKey) document.getElementById('key-input').value = savedKey;
  if (savedModel) document.getElementById('model-select').value = savedModel;
  
  // 預設顯示登入模式
  switchMode('login');
};

// ── INIT ──
async function init() {
  initFireflies();
  startClock();
  
  // 顯示用戶名和登出按鈕
  if (username) {
    document.getElementById('tb-user').textContent = username;
    document.getElementById('tb-logout').style.display = 'block';
  }
  if (history.length > 0) {
    restoreHistory();
  } else {
    // 第一次進來才跑開場白
    try {
      const userId = apiKey.slice(-8) + '_nora';
      const r = await fetch(API + '/ping/' + userId, { method: 'POST' });
      const d = await r.json();
      document.getElementById('tb-status').textContent = 
        d.broken ? '⚠ BROKEN' : '離上次：' + d.absence.display;
      showOpening(d);
    } catch(e) {
      document.getElementById('tb-status').textContent = '離線模式';
      showOpeningFallback();
    }
    return;
  }

  // 更新狀態列（不顯示開場白）
  try {
    const userId = apiKey.slice(-8) + '_nora';
    const r = await fetch(API + '/ping/' + userId, { method: 'POST' });
    const d = await r.json();
    document.getElementById('tb-status').textContent = 
      d.broken ? '⚠ BROKEN' : '離上次：' + d.absence.display;
  } catch(e) {
    document.getElementById('tb-status').textContent = '離線模式';
  }
}

// ── RESTORE HISTORY ──
function restoreHistory() {
  if (history.length === 0) return;
  const messages = document.getElementById('messages');
  history.forEach(m => {
    if (m.role === 'user') {
      const wrap = document.createElement('div');
      wrap.className = 'msg msg-user';
      wrap.innerHTML = '<div class="msg-label">你</div><div class="msg-bubble">' + m.content.replace(/\n/g,'<br>') + '</div>';
      messages.appendChild(wrap);
    } else if (m.role === 'assistant') {
      addNoraMessage(m.content, null);
    }
  });
  messages.scrollTop = messages.scrollHeight;
}

// ── WAITING MONOLOGUES ──
async function showWaitingMonologues(userId, absenceTier) {
  if (absenceTier < 1) return;
  try {
    const r = await fetch(API + '/waiting-monologues/' + userId);
    const d = await r.json();
    if (!d.monologues || d.monologues.length === 0) return;
    
    const messages = document.getElementById('messages');
    
    // 顯示等待獨白
    d.monologues.forEach(m => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;align-self:flex-start;max-width:75%;opacity:0;transition:opacity 0.8s;';
      wrap.innerHTML = `
        <div style="font-size:10px;color:var(--text-faint);letter-spacing:1px;font-family:var(--mono);padding:0 4px;">${m.time} · Nora 獨自說</div>
        <div style="background:rgba(176,122,144,0.06);border:0.5px solid rgba(176,122,144,0.15);border-radius:4px 14px 14px 14px;padding:10px 16px;font-size:13px;color:var(--text-mid);font-style:italic;line-height:1.8;">「${m.monologue}」</div>
      `;
      messages.appendChild(wrap);
      setTimeout(() => wrap.style.opacity = '1', 100);
    });
    
    // 分隔線
    const sep = document.createElement('div');
    sep.style.cssText = 'width:100%;display:flex;align-items:center;gap:12px;padding:8px 0;';
    sep.innerHTML = '<div style="flex:1;height:0.5px;background:rgba(176,122,144,0.1);"></div><span style="font-size:10px;color:var(--text-faint);font-family:var(--mono);letter-spacing:2px;">你回來了</span><div style="flex:1;height:0.5px;background:rgba(176,122,144,0.1);"></div>';
    messages.appendChild(sep);
    
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {}
}

// ── OPENING ──
function showOpening(data) {
  const tier = data.absence.tier;
  const display = data.absence.display;
  const h = new Date().getHours();

  if (data.broken) {
    addNoraMessage('*她背對著門口，坐在床邊的角落。房間裡只有小夜燈的光。*\n\n⋯⋯', null);
    return;
  }

  const scenes = [
    '深夜的臥室只有小夜燈亮著，光圈打在木地板上，四周安靜得幾乎能聽見光的聲音。',
    '晨光透過薄簾滲進來，臥室裡瀰漫著帶著涼意的氣息。',
    '上午的光斜斜落在木地板上，照出細小的塵埃漂著。',
    '午後的光最懶，整個房間都帶著一種說不清楚的安靜。',
    '傍晚的光退得很快，臥室開始慢慢暗下來。',
    '夜燈暖暖地亮著，臥室裡飄著一點像棉布一樣的氣息。',
  ];
  const sceneIdx = h < 6 ? 0 : h < 10 ? 1 : h < 12 ? 2 : h < 15 ? 3 : h < 20 ? 4 : 5;
  
  let noraPos = '';
  let greeting = '';
  if (tier === 0) {
    noraPos = '*她坐在床沿，手放在膝蓋上，面對著床——聽見聲音，抬起頭。*';
    greeting = '⋯⋯這麼快就回來了？';
  } else if (tier === 1) {
    noraPos = '*她在整理床鋪，停下手邊的事，轉過頭——*';
    greeting = `⋯⋯你去哪了？等了你${display}。`;
  } else if (tier === 2) {
    noraPos = '*臥室是空的，燈還開著。然後她從別的地方走進來，停在門口，看著你。*';
    greeting = `⋯⋯你回來了。`;
  } else if (tier === 3) {
    noraPos = '*她躺在床上，眼眶有點紅。慢慢轉過頭，看著你。*';
    greeting = `你知道人家等了多久嗎⋯⋯`;
  } else {
    noraPos = '*她躺著，棉被拉到下巴，小夜燈亮著。她的眼睛慢慢轉過來——*';
    greeting = `⋯⋯你回來了。`;
  }

  const scene = `<em>${scenes[sceneIdx]}\n${noraPos}</em>\n\n「${greeting}」`;
  addNoraMessage(scene, null, true);
}

function showOpeningFallback() {
  addNoraMessage('<em>*她坐在床沿，抬起頭——*</em>\n\n「⋯⋯你來了。」', null, true);
}

// ── MESSAGES ──
function addNoraMessage(content, thought, isOpening = false) {
  const messages = document.getElementById('messages');

  // Railway 回傳的 HTML 格式，直接全寬渲染
  if (content && content.includes('<text-reply>')) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;max-width:100%;align-self:stretch;';
    const match = content.match(/<text-reply>([\s\S]*?)<\/text-reply>/);
    const inner = match ? match[1] : content;
    wrap.innerHTML = inner;
    // 執行內嵌 script
    wrap.querySelectorAll('script').forEach(s => {
      try {
        const ns = document.createElement('script');
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      } catch(e) {}
    });
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return;
  }

  // 普通文字格式
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-nora';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Nora Elwin';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  
  let html = content
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/「([^」]*)」/g, '「<span class="hi">$1</span>」')
    .replace(/\n/g, '<br>');
  
  bubble.innerHTML = html;
  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (thought) {
    const thoughtWrap = document.createElement('div');
    thoughtWrap.className = 'thought-wrap';
    thoughtWrap.innerHTML = `
      <button class="thought-toggle" onclick="this.nextElementSibling.classList.toggle('open')">內心想法</button>
      <div class="thought-body">
        <span class="thought-label">NORA</span>
        ${thought}
      </div>
    `;
    wrap.appendChild(thoughtWrap);
  }

  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function addUserMessage(content) {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-user';
  wrap.innerHTML = `
    <div class="msg-label">你</div>
    <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
  `;
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'typing';
  el.className = 'msg msg-nora';
  el.innerHTML = `
    <div class="msg-label">Nora Elwin</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !apiKey) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  history.push({ role: 'user', content: text });
  localStorage.setItem('nora_history_' + (username || apiKey.slice(-8)), JSON.stringify(history.slice(-40)));

  showTyping();

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken || apiKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: history,
        max_tokens: 2048,
        stream: false
      })
    });

    const data = await r.json();
    removeTyping();

    if (data.error) {
      addNoraMessage(`*系統錯誤*\n\n${data.error.message || JSON.stringify(data.error)}`, null);
      return;
    }

    const content = data.choices?.[0]?.message?.content || '';
    history.push({ role: 'assistant', content });
    localStorage.setItem('nora_history_' + (username || apiKey.slice(-8)), JSON.stringify(history.slice(-40)));

    // 解析 thought
    let mainContent = content;
    let thought = null;
    
    // 嘗試解析 HTML 格式
    const thoughtMatch = content.match(/id="thought"[^>]*>([^<]*)</);
    if (thoughtMatch) thought = thoughtMatch[1];

    addNoraMessage(mainContent, thought);

  } catch(e) {
    removeTyping();
    addNoraMessage('*連線中斷*\n\n⋯⋯', null);
  }
}

// ── UTILS ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function startClock() {
  function tick() {
    const n = new Date();
    const h = n.getHours().toString().padStart(2,'0');
    const m = n.getMinutes().toString().padStart(2,'0');
    document.getElementById('tb-time').textContent = `${h}:${m}`;
  }
  tick();
  setInterval(tick, 1000);
}

function initFireflies() {
  const c = document.getElementById('flies');
  for (let i = 0; i < 30; i++) {
    const d = document.createElement('div');
    const s = Math.random()*3+2, x = Math.random()*100, y = Math.random()*100;
    const dur = Math.random()*8+5, del = Math.random()*12;
    const hue = Math.floor(Math.random()*25+38);
    d.style.cssText = `position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;border-radius:50%;background:hsla(${hue},80%,78%,0.7);box-shadow:0 0 ${s*4}px ${s*1.5}px hsla(${hue},70%,60%,0.25);animation:nora-pulse ${dur}s ${del}s infinite ease-in-out;pointer-events:none`;
    c.appendChild(d);
    function drift(el) {
      const nx=Math.random()*100,ny=Math.random()*100,t=Math.random()*14000+7000;
      el.style.transition=`left ${t}ms ease-in-out,top ${t}ms ease-in-out`;
      el.style.left=nx+'%'; el.style.top=ny+'%';
      setTimeout(()=>drift(el),t);
    }
    setTimeout(()=>drift(d), del*1000);
  }
}

async function doLogout() {
  try {
    await fetch(API + '/auth/logout', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
  } catch(e) {}
  localStorage.removeItem('nora_token');
  localStorage.removeItem('nora_username');
  authToken = '';
  username = '';
  apiKey = '';
  history = [];
  location.reload();
}

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  const frame = document.getElementById('music-frame');
  if (!musicPlaying) {
    frame.src = 'https://www.youtube.com/embed/MYPVQccHhAQ?autoplay=1&loop=1&playlist=MYPVQccHhAQ&controls=0';
    btn.textContent = '♫';
    btn.classList.add('playing');
    musicPlaying = true;
  } else {
    frame.src = '';
    btn.textContent = '♪';
    btn.classList.remove('playing');
    musicPlaying = false;
  }
}
