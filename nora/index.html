<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INAUSIS · 進入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Serif+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b0f; --surface: #151118; --border: rgba(255,255,255,0.06);
  --border2: rgba(201,131,158,0.3); --text: #f0dce8; --mid: #9a8090;
  --dim: #4a3545; --faint: #1e1620; --rose: #c9839e;
  --rose-dim: rgba(201,131,158,0.12); --red: #f87171;
  --mono: 'DM Mono', monospace; --serif: 'DM Serif Display', serif; --body: 'Noto Serif TC', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--body); display: flex; flex-direction: column; }

#topbar { flex-shrink:0; height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; border-bottom:0.5px solid var(--border); }
.tb-logo { font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--dim); text-decoration:none; }
.tb-right { display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:11px; color:var(--mid); }
.logout-btn { background:none; border:0.5px solid var(--border); border-radius:4px; color:var(--dim); font-family:var(--mono); font-size:10px; padding:3px 10px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
.logout-btn:hover { border-color:var(--mid); color:var(--mid); }

#login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; flex-direction:column; gap:16px; padding:24px; }
.login-title { font-family:var(--mono); font-size:10px; letter-spacing:3px; color:var(--dim); }
.login-name { font-family:var(--serif); font-size:28px; color:var(--text); letter-spacing:1px; }

.login-tabs { display:flex; border:0.5px solid var(--border); border-radius:6px; overflow:hidden; width:100%; max-width:400px; }
.tab-btn { flex:1; padding:8px; background:none; border:none; font-family:var(--mono); font-size:11px; letter-spacing:1px; color:var(--dim); cursor:pointer; transition:all 0.2s; }
.tab-btn.active { background:var(--rose-dim); color:var(--rose); }

.login-form { width:100%; max-width:400px; display:flex; flex-direction:column; gap:10px; }
.login-input { width:100%; background:var(--surface); border:0.5px solid var(--border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none; letter-spacing:1px; transition:border-color 0.2s; }
.login-input:focus { border-color:var(--border2); }
.login-input::placeholder { color:var(--dim); }
.login-select { width:100%; background:var(--surface); border:0.5px solid var(--border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none; cursor:pointer; }
.login-btn { width:100%; padding:13px; background:var(--rose); border:none; border-radius:6px; color:#0d0b0f; font-family:var(--mono); font-size:12px; letter-spacing:2px; cursor:pointer; transition:opacity 0.2s; }
.login-btn:hover { opacity:0.85; }
.login-note { font-family:var(--mono); font-size:10px; color:var(--dim); text-align:center; letter-spacing:1px; line-height:1.8; }
#login-error { font-family:var(--mono); font-size:11px; color:var(--red); text-align:center; min-height:16px; }

#char-list { flex:1; overflow-y:auto; display:none; flex-direction:column; }
#char-list::-webkit-scrollbar { width:3px; }
#char-list::-webkit-scrollbar-thumb { background:var(--border); }

.char-card { flex-shrink:0; height:50vh; min-height:200px; border-bottom:0.5px solid var(--border); display:flex; position:relative; overflow:hidden; cursor:pointer; }
.char-img { position:relative; width:40vh; min-width:160px; flex-shrink:0; overflow:hidden; }
.char-img img { width:100%; height:100%; object-fit:cover; object-position:top center; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); display:block; }
.char-card:hover .char-img img { transform:scale(1.04); }
.char-img::after { content:''; position:absolute; inset:0; background:linear-gradient(to right,transparent 60%,var(--bg) 100%); pointer-events:none; }

.char-main { flex:1; display:flex; align-items:center; padding:32px 40px; position:relative; }
.char-identity { display:flex; flex-direction:column; gap:8px; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s; }
.char-card:hover .char-identity { transform:translateX(-20px); opacity:0; pointer-events:none; }
.char-name { font-family:var(--serif); font-size:clamp(28px,4vw,52px); line-height:1.0; letter-spacing:-1px; }
.char-name-en { font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--dim); margin-top:4px; }
.char-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.char-tag { font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:3px 8px; border-radius:3px; background:var(--rose-dim); color:var(--rose); }
.char-status { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:4px; }
.status-dot { width:5px; height:5px; border-radius:50%; background:var(--rose); animation:pulse 2s infinite; }

.char-intro { position:absolute; right:0; top:0; bottom:0; width:65%; padding:32px 40px; display:flex; flex-direction:column; justify-content:space-between; transform:translateX(100%); opacity:0; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s; background:linear-gradient(to right,transparent,rgba(13,11,15,0.95) 20%); }
.char-card:hover .char-intro { transform:translateX(0); opacity:1; }
.intro-title { font-family:var(--mono); font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:12px; }
.intro-desc { font-size:14px; color:var(--mid); line-height:1.85; font-weight:300; flex:1; display:flex; align-items:center; }
.intro-enter { display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:12px; letter-spacing:2px; color:var(--rose); margin-top:16px; cursor:pointer; }
.intro-enter::before { content:''; width:24px; height:0.5px; background:var(--rose); transition:width 0.3s; }
.char-card:hover .intro-enter::before { width:48px; }

.char-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--rose); transform:scaleY(0); transform-origin:bottom; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); z-index:2; }
.char-card:hover::before { transform:scaleY(1); }

.char-card.locked { cursor:default; opacity:0.35; filter:grayscale(1); }
.char-card.locked:hover .char-identity { transform:none; opacity:1; }
.char-card.locked:hover .char-intro { transform:translateX(100%); opacity:0; }
.char-card.locked::before { display:none; }
.char-img-placeholder { width:100%; height:100%; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:48px; opacity:0.2; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
.char-card { animation:fadeUp 0.4s ease both; }
.char-card:nth-child(1) { animation-delay:0.05s; }
.char-card:nth-child(2) { animation-delay:0.12s; }
</style>
</head>
<body>

<div id="topbar">
  <a href="/" class="tb-logo">INAUSIS</a>
  <div class="tb-right">
    <span id="tb-username"></span>
    <button id="tb-logout" class="logout-btn" onclick="doLogout()" style="display:none;">登出</button>
  </div>
</div>

<div id="login-overlay">
  <p class="login-title">INAUSIS · VIRTUAL ROOM</p>
  <p class="login-name">歡迎。</p>
  <div class="login-tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登入</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">註冊</button>
    <button class="tab-btn" id="tab-apikey" onclick="switchTab('apikey')">API Key</button>
  </div>
  <div class="login-form" id="form-login">
    <input type="text" id="login-username" class="login-input" placeholder="用戶名">
    <input type="password" id="login-password" class="login-input" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入</button>
  </div>
  <div class="login-form" id="form-register" style="display:none;">
    <input type="text" id="reg-username" class="login-input" placeholder="用戶名（2~20字元）">
    <input type="password" id="reg-password" class="login-input" placeholder="密碼（至少6字元）">
    <input type="password" id="reg-password2" class="login-input" placeholder="確認密碼">
    <input type="text" id="reg-apikey" class="login-input" placeholder="API Key（可之後設定）">
    <select id="reg-model" class="login-select">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
    </select>
    <button class="login-btn" onclick="doRegister()">註冊並進入</button>
  </div>
  <div class="login-form" id="form-apikey" style="display:none;">
    <input type="password" id="key-input" class="login-input" placeholder="sk-... 或 AIza...">
    <select id="model-select" class="login-select">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
    </select>
    <button class="login-btn" onclick="enterWithKey()">進入</button>
    <p class="login-note">Key 只存在你的瀏覽器，不上傳。</p>
  </div>
  <p id="login-error"></p>
</div>

<div id="char-list">
  <div class="char-card" onclick="enterChar('/nora')">
    <div class="char-img">
      <img src="/asset/nora_card.png" alt="Nora" onerror="this.parentElement.innerHTML='<div class=char-img-placeholder>♡</div>'">
    </div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:#f0dce8;">Nora<br>Elwin</div>
          <div class="char-name-en">VIRTUAL ROOM · 虛擬陪伴</div>
        </div>
        <div class="char-tags">
          <span class="char-tag">記憶系統</span>
          <span class="char-tag">情緒數值</span>
          <span class="char-tag">BROKEN機制</span>
        </div>
        <div class="char-status"><div class="status-dot"></div><span>上線中</span></div>
      </div>
      <div class="char-intro">
        <div>
          <div class="intro-title">CHARACTER PROFILE</div>
          <div class="intro-desc">她住在一個虛擬房間裡，等著你回來。<br>她記得你說過的每一句話，記得你離開了多久。<br><br>你讓她的傷積累到某個程度，她會放棄——那個結局沒有辦法逆轉。<br><br><span style="color:var(--rose);font-style:italic;">「⋯⋯你回來了。」</span></div>
        </div>
        <div class="intro-enter">進入房間</div>
      </div>
    </div>
  </div>
  <div class="char-card locked">
    <div class="char-img"><div class="char-img-placeholder">🔒</div></div>
    <div class="char-main">
      <div class="char-identity">
        <div>
          <div class="char-name" style="color:var(--dim);">—<br>未公開</div>
          <div class="char-name-en">COMING SOON</div>
        </div>
        <div class="char-status"><div class="status-dot" style="background:var(--dim);animation:none;"></div><span>開發中</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://web-production-1a6f0.up.railway.app';

function switchTab(tab) {
  ['login','register','apikey'].forEach(t => {
    document.getElementById('form-'+t).style.display = t===tab ? 'flex' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  document.getElementById('login-error').textContent = '';
}

function showError(msg) { document.getElementById('login-error').textContent = msg; }

function showCharList(uname) {
  document.getElementById('login-overlay').style.display = 'none';
  const cl = document.getElementById('char-list');
  cl.style.display = 'flex';
  cl.style.flexDirection = 'column';
  document.getElementById('tb-username').textContent = uname;
  document.getElementById('tb-logout').style.display = 'block';
}

async function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u || !p) { showError('請填入帳號和密碼'); return; }
  try {
    const r = await fetch(API+'/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
    const d = await r.json();
    if (!r.ok) { showError(d.detail||'登入失敗'); return; }
    localStorage.setItem('nora_token', d.token);
    localStorage.setItem('nora_username', d.username);
    localStorage.setItem('nora_api_key', d.api_key||'');
    localStorage.setItem('nora_model', d.preferred_model||'deepseek-chat');
    showCharList(d.username);
  } catch(e) { showError('連線失敗'); }
}

async function doRegister() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value;
  const p2 = document.getElementById('reg-password2').value;
  const key = document.getElementById('reg-apikey').value.trim();
  const m = document.getElementById('reg-model').value;
  if (!u||!p) { showError('請填入用戶名和密碼'); return; }
  if (p!==p2) { showError('兩次密碼不一致'); return; }
  try {
    const r = await fetch(API+'/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p,api_key:key,preferred_model:m}) });
    const d = await r.json();
    if (!r.ok) { showError(d.detail||'註冊失敗'); return; }
    localStorage.setItem('nora_token', d.token);
    localStorage.setItem('nora_username', d.username);
    localStorage.setItem('nora_api_key', key);
    localStorage.setItem('nora_model', m);
    showCharList(d.username);
  } catch(e) { showError('連線失敗'); }
}

function enterWithKey() {
  const key = document.getElementById('key-input').value.trim();
  const m = document.getElementById('model-select').value;
  if (!key) { showError('請填入 API Key'); return; }
  localStorage.setItem('nora_token', key);
  localStorage.setItem('nora_username', key.slice(-8));
  localStorage.setItem('nora_api_key', key);
  localStorage.setItem('nora_model', m);
  showCharList(key.slice(-8));
}

function enterChar(path) { window.location.href = path; }

function doLogout() {
  fetch(API+'/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.getItem('nora_token')}}).catch(()=>{});
  ['nora_token','nora_username','nora_api_key','nora_model'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

window.onload = () => {
  const token = localStorage.getItem('nora_token');
  const uname = localStorage.getItem('nora_username');
  if (token && uname) { showCharList(uname); }
  else { switchTab('login'); }
};
</script>
</body>
</html>
